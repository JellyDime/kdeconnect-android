name: Sync, Build, and Release

on:
  schedule:
    - cron: '0 */1 * * *'
  push:
    branches:
      - master
  workflow_dispatch:

env:
  UPSTREAM_REPO: KDE/kdeconnect-android
  TARGET_BRANCH: master
  APK_PATH: app/build/outputs/apk/debug/app-debug.apk

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository != 'KDE/kdeconnect-android' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    outputs:
      pushed: ${{ steps.sync_step.outputs.pushed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        id: sync_step
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
          git fetch upstream
          
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse upstream/${{ env.TARGET_BRANCH }})
          
          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "⚠️ New commits found upstream. Syncing..."
            git reset --hard upstream/${{ env.TARGET_BRANCH }}
            
            # FIXED: Reverted to --force. 
            # In a strict mirror scenario, we MUST overwrite the fork to match upstream.
            # --force-with-lease would abort if a race-condition manual push occurred, 
            # leaving the fork permanently out of sync.
            git push origin ${{ env.TARGET_BRANCH }} --force
            
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Already up to date with upstream."
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi
          
  build:
    runs-on: ubuntu-latest
    needs: sync

    if: always() && needs.sync.result != 'failure' && needs.sync.outputs.pushed != 'true'
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean Gradle Build
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Verify and Locate APK
        id: check_apk
        run: |
          # First, check the standard expected path (strictly quoted for safety)
          if [ -f "${{ env.APK_PATH }}" ]; then
            FINAL_APK="${{ env.APK_PATH }}"
          else
            # Robust fallback: Finds the most recently modified APK.
            # Uses 'ls -t' to sort by time natively, safely handling spaces in filenames.
            FINAL_APK=$(find app/build/outputs/apk -name "*.apk" -type f -exec ls -t {} + | head -n 1)
          fi

          # Strictly quote variables to prevent shell expansion errors
          if [ -z "$FINAL_APK" ] || [ ! -f "$FINAL_APK" ]; then
            echo "::error::Failed to locate APK after build. Expected: ${{ env.APK_PATH }}"
            exit 1
          fi
          
          echo "apk_path=$FINAL_APK" >> $GITHUB_OUTPUT
          echo "✅ Successfully located APK at: $FINAL_APK"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: auto-build-${{ github.sha }}-${{ github.run_id }}
          name: Automated Build (${{ github.sha }})
          draft: false
          prerelease: false
          files: ${{ steps.check_apk.outputs.apk_path }}
          body: |
            This is an automated build of KDE Connect Android synced from upstream.
            **Upstream Repo**: ${{ env.UPSTREAM_REPO }}
            **Commit**: ${{ github.sha }}
            **Trigger**: ${{ github.event_name }}
